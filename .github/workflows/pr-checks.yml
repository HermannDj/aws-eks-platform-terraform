name: PR Checks

on:
  pull_request:
    branches: [main, develop]
    paths: ["**.tf", ".github/workflows/**", "helm/**"]
  workflow_dispatch:

env:
  TF_VERSION: "1.7.4"
  TFLINT_VERSION: "v0.50.3"
  WORKING_DIR: "environments/dev"

jobs:
  terraform-fmt-validate:
    name: "fmt & validate"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with: { terraform_version: "${{ env.TF_VERSION }}" }
      - name: Terraform fmt
        run: terraform fmt -check -recursive -diff .
      - name: Terraform init
        run: terraform init -backend=false
        working-directory: ${{ env.WORKING_DIR }}
      - name: Terraform validate
        run: terraform validate
        working-directory: ${{ env.WORKING_DIR }}

  tflint:
    name: "tflint"
    runs-on: ubuntu-latest
    needs: terraform-fmt-validate
    steps:
      - uses: actions/checkout@v4
      - uses: terraform-linters/setup-tflint@v4
        with: { tflint_version: "${{ env.TFLINT_VERSION }}" }
      - name: TFLint init
        run: tflint --init
        env: { GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}" }
      - name: Run TFLint
        run: tflint --recursive --format compact

  checkov:
    name: "checkov security scan"
    runs-on: ubuntu-latest
    needs: terraform-fmt-validate
    steps:
      - uses: actions/checkout@v4
      - name: Install Checkov
        run: pip install checkov -q
      - name: Run Checkov
        run: |
          checkov -d . \
            --framework terraform \
            --output sarif \
            --output-file-path checkov-results.sarif \
            --skip-check CKV_AWS_79,CKV_AWS_58,CKV_AWS_149,CKV_AWS_83,CKV_AWS_130,CKV_AWS_117,CKV_AWS_115,CKV_AWS_272,CKV_AWS_116,CKV_AWS_338,CKV_AWS_111,CKV_AWS_356,CKV_AWS_108,CKV_AWS_1,CKV_AWS_109,CKV_AWS_107,CKV_AWS_110,CKV_AWS_60,CKV_AWS_61,CKV2_AWS_29,CKV2_AWS_5,CKV2_AWS_12 \
            --skip-path .terraform
      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        continue-on-error: true
        with: { sarif_file: checkov-results.sarif }

  terraform-plan-dev:
    name: "terraform plan (dev)"
    runs-on: ubuntu-latest
    needs: [tflint, checkov]
    permissions:
      pull-requests: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with: { terraform_version: "${{ env.TF_VERSION }}" }
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ca-central-1
      - name: Terraform init
        id: init
        run: terraform init
        working-directory: ${{ env.WORKING_DIR }}
      - name: Terraform plan
        id: plan
        run: terraform plan -no-color -input=false -var="db_password=${{ secrets.DB_PASSWORD }}"
        working-directory: ${{ env.WORKING_DIR }}
        continue-on-error: true
      - name: Comment PR
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const output = `## Terraform Plan — dev (EKS Platform)
            #### Init \`${{ steps.init.outcome }}\` | Plan \`${{ steps.plan.outcome }}\`
            <details><summary>Plan output</summary>

            \`\`\`hcl
            ${{ steps.plan.outputs.stdout }}
            \`\`\`
            </details>
            *By @${{ github.actor }} — \`${{ github.event_name }}\`*`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            })
      - name: Check plan status
        if: steps.plan.outcome == 'failure'
        run: exit 1
